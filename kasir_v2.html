<script>
let items=[];

fetch('barang.json')
.then(res=>res.json())
.then(data=>{
    const select=document.getElementById('barangSelect');
    data.forEach(b=>{
        const opt=document.createElement('option');
        opt.value=b.harga;
        opt.text=b.nama + " - Rp" + b.harga.toLocaleString();
        select.appendChild(opt);
    });
});

function generateInvoice(){
    const now=new Date();
    const code="SKA"+
    now.getFullYear()+
    String(now.getMonth()+1).padStart(2,'0')+
    String(now.getDate()).padStart(2,'0')+
    String(now.getHours()).padStart(2,'0')+
    String(now.getMinutes()).padStart(2,'0')+
    String(now.getSeconds()).padStart(2,'0');
    document.getElementById('invoiceNumber').value=code;
}
window.onload=generateInvoice;

function tambahItem(){
    const select=document.getElementById('barangSelect');
    const nama=select.options[select.selectedIndex].text.split(" - ")[0];
    const harga=parseInt(select.value);
    const jumlah=parseInt(document.getElementById('jumlah').value);

    const existing=items.find(i=>i.nama===nama);
    if(existing){ 
        existing.jumlah+=jumlah; 
    }else{ 
        items.push({nama,harga,jumlah}); 
    }

    renderTable();
}

function renderTable(){
    const tbody=document.getElementById('itemTable');
    tbody.innerHTML='';
    let total=0;

    items.forEach((item,index)=>{
        const itemTotal=item.harga*item.jumlah;
        total+=itemTotal;

        tbody.innerHTML+=`
        <tr>
        <td>${index+1}</td>
        <td>${item.nama}</td>
        <td>${item.jumlah}</td>
        <td class="right">Rp${item.harga.toLocaleString()}</td>
        <td class="right">Rp${itemTotal.toLocaleString()}</td>
        </tr>`;
    });

    /* ===== PERBAIKAN DP ===== */
    const dpInput=document.getElementById('dp').value.replace(/\D/g,'');
    const dp=parseInt(dpInput) || 0;
    /* ========================= */

    document.getElementById('subTotal').innerText="Rp"+total.toLocaleString();
    document.getElementById('dpPreview').innerText="Rp"+dp.toLocaleString();
    document.getElementById('sisaTagihan').innerText="Rp"+(total-dp).toLocaleString();

    let status="Belum Dibayar";
    if(dp>0 && dp<total) status="Belum Lunas (DP)";
    if(dp>=total && total>0) status="Lunas";
    document.getElementById('previewStatus').innerText=status;

    updatePreview();
}

function updatePreview(){
    document.getElementById('previewInvoice').innerText=document.getElementById('invoiceNumber').value;
    document.getElementById('previewTanggal').innerText=document.getElementById('tanggal').value;
    document.getElementById('previewJatuhTempo').innerText=document.getElementById('jatuhTempo').value;
    document.getElementById('previewNama').innerText=document.getElementById('nama').value;
    document.getElementById('previewAlamat').innerText=document.getElementById('alamat').value;
}

/* ===== FORMAT RIBUAN + VALIDASI DP ===== */
document.getElementById('dp').addEventListener('input', function(e){

    let value = e.target.value.replace(/\D/g,'');

    let subtotalText = document.getElementById('subTotal').innerText.replace(/\D/g,'');
    let subtotal = parseInt(subtotalText) || 0;

    let dp = parseInt(value) || 0;

    if(dp > subtotal){
        dp = subtotal;
    }

    e.target.value = dp.toLocaleString('id-ID');

    renderTable();
});
/* ======================================== */

document.getElementById('tanggal').addEventListener('input', renderTable);
document.getElementById('jatuhTempo').addEventListener('input', renderTable);
document.getElementById('nama').addEventListener('input', renderTable);
document.getElementById('alamat').addEventListener('input', renderTable);

/* ===== PDF ===== */
async function downloadPDF(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');

    const element = document.getElementById('invoice');

    const canvas = await html2canvas(element, { scale:2, useCORS:true });
    const imgData = canvas.toDataURL('image/png');

    const imgWidth = 210;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    pdf.addImage(imgData,'PNG',0,0,imgWidth,imgHeight);
    pdf.save('invoice.pdf');
}
</script>
