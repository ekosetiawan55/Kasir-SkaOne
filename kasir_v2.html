<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkaOne Phothography Invoice</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.container{max-width:1100px;margin:auto;padding:16px}
h1{margin-bottom:16px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.card{background:#1f2937;padding:12px;border-radius:8px;cursor:pointer;text-align:center}
.price{color:#f59e0b;font-weight:bold}

.cart{background:#111827;padding:16px;border-radius:10px;margin-top:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid #374151}

button{padding:10px;border:none;border-radius:6px;background:#2563eb;color:white;font-weight:bold;cursor:pointer}

.invoice{
  background:white;color:black;padding:30px;border-radius:10px;
  max-width:800px;margin:20px auto
}
.inv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{width:150px;height:auto}
.inv-table{width:100%;border-collapse:collapse}
.inv-table th{background:#374151;color:white;padding:8px}
.inv-table td{padding:8px;border-bottom:1px solid #ddd}
</style>
</head>

<body>
<div class="container">

<h1>Invoice</h1>

<div id="barangKasir" class="grid"></div>

<div class="cart">
<table>
<thead>
<tr>
<th>Deskripsi</th>
<th>Harga</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody id="cartBody"></tbody>
</table>

<h3>Total: <span id="totalHarga">Rp 0</span></h3>
<input id="uangPembeli" type="number" placeholder="Uang Pembeli">
<div>Kembalian: <b id="kembalian">Rp 0</b></div>
<br>
<button onclick="buatInvoice()">BUAT INVOICE</button>
</div>

<div id="invoiceBox"></div>

</div>

<script>
const rupiah=n=>"Rp "+(n||0).toLocaleString("id-ID");

async function getBarang(){
  const res = await fetch("barang.json");
  return await res.json();
}

let cart={};

async function renderBarang(){
  const list = await getBarang();
  const container = document.getElementById("barangKasir");
  container.innerHTML="";

  list.forEach(b=>{
    container.innerHTML+=`
      <div class="card" onclick="addCart(${b.id})">
        ${b.nama}<br>
        <span class="price">${rupiah(b.harga)}</span>
      </div>`;
  });
}

async function addCart(id){
  const list = await getBarang();
  const b = list.find(x=>x.id===id);

  if(!cart[id]) cart[id]={...b,qty:0};
  cart[id].qty++;
  renderCart();
}

function renderCart(){
  const body=document.getElementById("cartBody");
  body.innerHTML="";
  let total=0;

  Object.values(cart).forEach(i=>{
    const sub=i.qty*i.harga;
    total+=sub;
    body.innerHTML+=`
      <tr>
        <td>${i.nama}</td>
        <td>${rupiah(i.harga)}</td>
        <td>${i.qty}</td>
        <td>${rupiah(sub)}</td>
      </tr>`;
  });

  document.getElementById("totalHarga").textContent=rupiah(total);

  const bayar=+document.getElementById("uangPembeli").value||0;
  document.getElementById("kembalian").textContent=rupiah(bayar-total);
}

document.getElementById("uangPembeli").oninput=renderCart;

function buatInvoice(){
  const items=Object.values(cart);
  if(!items.length) return;

  const total=items.reduce((a,b)=>a+b.qty*b.harga,0);
  const bayar=+document.getElementById("uangPembeli").value||0;

  document.getElementById("invoiceBox").innerHTML=`
    <div class="invoice">
      <div class="inv-header">
        <img src="Logo.png" class="logo">
        <div>
          <h2>INVOICE</h2>
          ${new Date().toLocaleString("id-ID")}
        </div>
      </div>

      <table class="inv-table">
        <tr>
          <th>No</th>
          <th>Item</th>
          <th>Qty</th>
          <th>Harga</th>
          <th>Total</th>
        </tr>
        ${items.map((i,x)=>`
          <tr>
            <td>${x+1}</td>
            <td>${i.nama}</td>
            <td>${i.qty}</td>
            <td>${rupiah(i.harga)}</td>
            <td>${rupiah(i.qty*i.harga)}</td>
          </tr>`).join("")}
      </table>

      <h3>Total: ${rupiah(total)}</h3>
      Bayar: ${rupiah(bayar)}<br>
      Kembali: ${rupiah(bayar-total)}
    </div>
  `;

  cart={};
  renderCart();
}

document.addEventListener("DOMContentLoaded", async ()=>{
  await renderBarang();
});
</script>

</body>
</html>
