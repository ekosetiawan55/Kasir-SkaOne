<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.container{max-width:1100px;margin:auto;padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.card{background:#1f2937;padding:12px;border-radius:8px;cursor:pointer;text-align:center}
.price{color:#f59e0b;font-weight:bold}
.cart{background:#111827;padding:16px;border-radius:10px;margin-top:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid #374151}
button{padding:10px;border:none;border-radius:6px;background:#2563eb;color:white;font-weight:bold;cursor:pointer;margin-top:10px}
.status-lunas{color:#22c55e;font-weight:bold}
.status-belum{color:#ef4444;font-weight:bold}
input{padding:8px;width:100%;margin-top:10px;border-radius:6px;border:none}
</style>
</head>

<body>
<div class="container">

<h1>Kasir PRO</h1>

<div id="barangKasir" class="grid"></div>

<div class="cart">
<table>
<thead>
<tr>
<th>Barang</th>
<th>Harga</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody id="cartBody"></tbody>
</table>

<h3>Total: <span id="totalHarga">Rp 0</span></h3>

<input id="uangMuka" type="number" placeholder="Uang Muka (DP)">
<div>Sisa Tagihan: <b id="sisaTagihan">Rp 0</b></div>
<div>Status: <span id="statusPembayaran" class="status-belum">BELUM LUNAS</span></div>

<button onclick="buatInvoice()">BUAT INVOICE</button>
<button onclick="downloadPDF()">DOWNLOAD PDF</button>
</div>

</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const rupiah=n=>"Rp "+(n||0).toLocaleString("id-ID");

let cart={};
let cartBackup=[];
let lastDP=0;
let invoiceCounter=1;

async function getBarang(){
  const res=await fetch("barang.json");
  return await res.json();
}

async function renderBarang(){
  const list=await getBarang();
  const container=document.getElementById("barangKasir");
  container.innerHTML="";
  list.forEach(b=>{
    container.innerHTML+=`
      <div class="card" onclick="addCart(${b.id})">
        ${b.nama}<br>
        <span class="price">${rupiah(b.harga)}</span>
      </div>`;
  });
}

async function addCart(id){
  const list=await getBarang();
  const b=list.find(x=>x.id===id);
  if(!cart[id]) cart[id]={...b,qty:0};
  cart[id].qty++;
  renderCart();
}

function renderCart(){
  const body=document.getElementById("cartBody");
  body.innerHTML="";
  let total=0;

  Object.values(cart).forEach(i=>{
    const sub=i.qty*i.harga;
    total+=sub;
    body.innerHTML+=`
      <tr>
        <td>${i.nama}</td>
        <td>${rupiah(i.harga)}</td>
        <td>${i.qty}</td>
        <td>${rupiah(sub)}</td>
      </tr>`;
  });

  document.getElementById("totalHarga").textContent=rupiah(total);

  const dp=+document.getElementById("uangMuka").value||0;
  const sisa=total-dp;

  document.getElementById("sisaTagihan").textContent=rupiah(sisa);

  const statusEl=document.getElementById("statusPembayaran");
  if(sisa<=0 && total>0){
    statusEl.textContent="LUNAS";
    statusEl.className="status-lunas";
  }else{
    statusEl.textContent="BELUM LUNAS";
    statusEl.className="status-belum";
  }
}

document.getElementById("uangMuka").oninput=renderCart;

function buatInvoice(){
  const items=Object.values(cart);
  if(!items.length) return alert("Belum ada transaksi!");

  const total=items.reduce((a,b)=>a+b.qty*b.harga,0);
  const dp=+document.getElementById("uangMuka").value||0;

  cartBackup=JSON.parse(JSON.stringify(items));
  lastDP=dp;

  cart={};
  document.getElementById("uangMuka").value="";
  renderCart();
}

async function downloadPDF(){
  const { jsPDF } = window.jspdf;

  if(!cartBackup.length) return alert("Klik BUAT INVOICE dulu!");

  const total=cartBackup.reduce((a,b)=>a+b.qty*b.harga,0);
  const dp=lastDP;
  const sisa=total-dp;
  const status=sisa<=0 ? "LUNAS" : "BELUM LUNAS";

  const doc=new jsPDF("p","mm","a4");
  const pageWidth=210;

  let y=20;

  // ===== LOAD LOGO =====
  const logo = await loadImage("Logo.png");
  doc.addImage(logo, "PNG", 15, 15, 35, 20);

  // ===== HEADER =====
  doc.setFontSize(20);
  doc.text("INVOICE", pageWidth-20, 20, { align: "right" });

  doc.setFontSize(11);
  doc.text("No Invoice: INV-"+invoiceCounter, pageWidth-20, 28, { align: "right" });
  doc.text("Tanggal: "+new Date().toLocaleString("id-ID"), pageWidth-20, 34, { align: "right" });

  y=45;

  // ===== TABLE HEADER =====
  doc.setFillColor(30,41,59);
  doc.rect(15,y,180,8,"F");

  doc.setTextColor(255,255,255);
  doc.setFontSize(11);
  doc.text("No",20,y+5);
  doc.text("Item",30,y+5);
  doc.text("Qty",130,y+5);
  doc.text("Harga",145,y+5);
  doc.text("Total",170,y+5);

  y+=10;
  doc.setTextColor(0,0,0);

  // ===== TABLE BODY =====
  cartBackup.forEach((i,index)=>{
    const sub=i.qty*i.harga;

    doc.text(String(index+1),20,y);
    doc.text(i.nama,30,y);
    doc.text(String(i.qty),132,y);
    doc.text(rupiah(i.harga),145,y);
    doc.text(rupiah(sub),170,y);

    y+=8;
  });

  // ===== TOTAL SECTION =====
  y+=10;

  doc.setDrawColor(200);
  doc.line(120,y,195,y);
  y+=6;

  doc.text("Total",130,y);
  doc.text(rupiah(total),170,y,{align:"right"});
  y+=8;

  doc.text("Uang Muka",130,y);
  doc.text(rupiah(dp),170,y,{align:"right"});
  y+=8;

  doc.setFontSize(12);
  doc.text("Sisa Tagihan",130,y);
  doc.text(rupiah(sisa),170,y,{align:"right"});
  y+=12;

  doc.setFontSize(13);
  doc.text("Status: "+status,15,y);

  doc.save("INV-"+invoiceCounter+".pdf");
  invoiceCounter++;
}


// ===== HELPER LOAD IMAGE =====
function loadImage(url){
  return new Promise((resolve)=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.src=url;
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      canvas.width=img.width;
      canvas.height=img.height;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0);
      resolve(canvas.toDataURL("image/png"));
    };
  });
}

document.addEventListener("DOMContentLoaded",renderBarang);
</script>

</body>
</html>
