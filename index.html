<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkaOne Invoice</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{ margin-bottom:20px; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:#1f2937;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  transition:.2s;
}
.card:hover{ background:#374151; }

.price{ color:#f59e0b; font-weight:bold }

.cart{
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-top:25px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:8px;
  border-bottom:1px solid #374151;
}

th{ background:#1f2937 }

button{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
  margin-right:10px;
}

/* ===== INVOICE STYLE ===== */

.preview-box{
  background:#fff;
  color:#000;
  padding:40px;
  margin-top:30px;
  width:800px;
  margin-left:auto;
  margin-right:auto;
  font-family:Times New Roman, serif;
}

.invoice-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.logo-area img{
  width:140px;
}

.company-text{
  font-size:13px;
  line-height:1.5;
}

.invoice-right{
  text-align:right;
  font-size:14px;
}

.invoice-right h1{
  margin:0;
  font-size:32px;
}

.status{
  margin:15px 0;
  font-weight:bold;
}

.invoice-table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

.invoice-table th{
  background:#555;
  color:#fff;
  padding:8px;
  font-weight:normal;
}

.invoice-table td{
  padding:8px;
  border-bottom:1px solid #ccc;
}

.summary{
  width:300px;
  margin-left:auto;
  margin-top:20px;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  padding:5px 0;
}

.summary-total{
  background:#eee;
  padding:6px;
  font-weight:bold;
}

.footer-note{
  margin-top:35px;
  text-align:center;
  font-size:14px;
}

.footer-note a{
  color:#1d4ed8;
  text-decoration:none;
}
</style>
</head>

<body>
<div class="container">

<h1>SkaOne Invoice</h1>

<div class="cart">
<input id="namaPelanggan" placeholder="Nama Pelanggan">
<textarea id="alamatPelanggan" placeholder="Alamat Pelanggan"></textarea>

<table>
<thead>
<tr>
<th>Barang</th>
<th>Harga</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>
</thead>
<tbody id="cartBody"></tbody>
</table>

<h3>Total: <span id="totalHarga">Rp 0</span></h3>

<input id="uangMuka" type="number" placeholder="Uang Muka (DP)">
<div>Sisa Tagihan: <b id="sisaTagihan">Rp 0</b></div>

<button onclick="addSample()">Tambah Contoh Item</button>
<button onclick="buatPreview()">PREVIEW INVOICE</button>
<button onclick="downloadPDF()">DOWNLOAD PDF</button>
</div>

<div id="previewArea"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const rupiah = n => "Rp " + (n || 0).toLocaleString("id-ID");

let cart = {};
let invoiceCounter = 1;

function addSample(){
  const id = Date.now();
  cart[id] = {
    nama:"Paket Foto Wedding",
    harga:1500000,
    qty:1
  };
  renderCart();
}

function renderCart(){
  const body = document.getElementById("cartBody");
  body.innerHTML = "";
  let total = 0;

  Object.values(cart).forEach(i=>{
    const sub = i.qty * i.harga;
    total += sub;

    body.innerHTML += `
      <tr>
        <td>${i.nama}</td>
        <td>${rupiah(i.harga)}</td>
        <td>${i.qty}</td>
        <td>${rupiah(sub)}</td>
      </tr>`;
  });

  document.getElementById("totalHarga").textContent = rupiah(total);

  const dp = +document.getElementById("uangMuka").value || 0;
  const sisa = total - dp;
  document.getElementById("sisaTagihan").textContent = rupiah(sisa);
}

function buatPreview(){

  const items = Object.values(cart);
  if(!items.length) return alert("Belum ada transaksi!");

  const total = items.reduce((a,b)=>a+b.qty*b.harga,0);
  const dp = +document.getElementById("uangMuka").value || 0;
  const sisa = total - dp;

  const nama = document.getElementById("namaPelanggan").value;
  const alamat = document.getElementById("alamatPelanggan").value;
  const tanggal = new Date().toLocaleDateString("id-ID");

  let rows = "";

  items.forEach((i,index)=>{
    const sub = i.qty * i.harga;
    rows += `
      <tr>
        <td>${index+1}</td>
        <td>${i.nama}</td>
        <td>${i.qty}</td>
        <td>${rupiah(i.harga)}</td>
        <td>${rupiah(sub)}</td>
      </tr>`;
  });

  const html = `
  <div class="preview-box" id="invoiceArea">

    <div class="invoice-top">

      <div>
        <div class="logo-area">
          <img src="logo.png">
        </div>

        <div class="company-text">
          Kalinampu, Seloharjo, Pundong, Bantul, Yogyakarta<br>
          0857-1213-0175
        </div>
      </div>

      <div class="invoice-right">
        <h1>INVOICE</h1>
        Invoice #: INV-${new Date().getFullYear()}-${invoiceCounter}<br>
        Tanggal: ${tanggal}<br>
        Jatuh Tempo: -<br>
        Job: -<br><br>

        Nama Pemesan: ${nama}<br>
        Alamat: ${alamat}
      </div>

    </div>

    <div class="status">
      Status: ${sisa <= 0 ? "Lunas" : "Belum Bayar"}
    </div>

    <table class="invoice-table">
      <thead>
        <tr>
          <th>No</th>
          <th>Deskripsi</th>
          <th>Jumlah</th>
          <th>Harga</th>
          <th>Total Harga</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>

    <div class="summary">
      <div class="summary-row">
        <span>Sub Total</span>
        <span>${rupiah(total)}</span>
      </div>
      <div class="summary-row">
        <span>Uang Muka</span>
        <span>${rupiah(dp)}</span>
      </div>
      <div class="summary-row summary-total">
        <span>Total Sisa Tagihan</span>
        <span>${rupiah(sisa)}</span>
      </div>
    </div>

    <div class="footer-note">
      Abadikan moment istimewamu bersama SkaOne Photography<br>
      <a href="mailto:skaonephotography@gmail.com">
        skaonephotography@gmail.com
      </a>
    </div>

  </div>
  `;

  document.getElementById("previewArea").innerHTML = html;
}

async function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const invoice = document.getElementById("invoiceArea");
  if(!invoice) return alert("Klik PREVIEW dulu!");

  const canvas = await html2canvas(invoice,{ scale:2 });
  const imgData = canvas.toDataURL("image/png");

  const doc = new jsPDF("p","mm","a4");

  const imgWidth = 190;
  const imgHeight = canvas.height * imgWidth / canvas.width;

  doc.addImage(imgData,"PNG",10,10,imgWidth,imgHeight);
  doc.save("INV-"+invoiceCounter+".pdf");

  invoiceCounter++;
}
</script>
</body>
</html>
