<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Invoice SkaOne Photography</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo{
    height:80px;
}
h2{
    margin:0;
}
.form-group{
    margin-bottom:15px;
}
label{
    font-weight:bold;
    display:block;
    margin-bottom:5px;
}
input, select{
    width:100%;
    padding:8px;
    box-sizing:border-box;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th, td{
    border:1px solid #ddd;
    padding:8px;
}
th{
    background:#f0f0f0;
}
.text-right{
    text-align:right;
}
.total-section{
    margin-top:20px;
    width:300px;
    float:right;
}
.status{
    margin-top:10px;
    font-weight:bold;
    text-align:center;
}
.footer{
    text-align:center;
    margin-top:40px;
}
button{
    padding:8px 12px;
    cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <img src="logo.png" class="logo">
    <div>
        <h2>INVOICE</h2>
        <div class="form-group">
            <label>Nomor Invoice</label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="invoiceNumber">
                <button type="button" onclick="generateInvoice()">Auto</button>
            </div>
        </div>
    </div>
</div>

<hr>

<div class="form-group">
    <label>Nama Pemesan</label>
    <input type="text" id="namaPemesan">
</div>

<div class="form-group">
    <label>Alamat</label>
    <input type="text" id="alamat">
</div>

<div class="form-group">
    <label>Job</label>
    <input type="text" id="job">
</div>

<div class="form-group">
    <label>Jatuh Tempo</label>
    <input type="date" id="jatuhTempo">
</div>

<table>
<thead>
<tr>
    <th>Nama Barang</th>
    <th>Harga</th>
    <th>Qty</th>
    <th>Total</th>
</tr>
</thead>
<tbody id="itemTable">
<tr>
    <td>
        <select onchange="updateHarga(this)">
            <option value="">Pilih Barang</option>
        </select>
    </td>
    <td class="text-right harga">0</td>
    <td><input type="number" value="1" min="1" onchange="hitungTotal()"></td>
    <td class="text-right total">0</td>
</tr>
</tbody>
</table>

<br>
<button onclick="tambahBaris()">Tambah Item</button>

<div class="total-section">
    <div class="form-group">
        <label>Subtotal</label>
        <input type="text" id="subtotal" class="text-right" readonly>
    </div>

    <div class="form-group">
        <label>Uang Muka (DP)</label>
        <input type="number" id="dp" class="text-right" value="0" onchange="hitungStatus()">
    </div>

    <div class="form-group">
        <label>Sisa</label>
        <input type="text" id="sisa" class="text-right" readonly>
    </div>

    <div class="status" id="statusPembayaran"></div>
</div>

<div style="clear:both;"></div>

<div class="footer">
    <hr>
    <p><strong>SkaOne Photography</strong></p>
    <p>Abadikan momentmu bersama SkaOne Photography</p>
    <p>Email: skaonephotography@email.com</p>
</div>

</div>

<script>
let daftarBarang = [];

fetch('barang.json')
.then(res => res.json())
.then(data => {
    daftarBarang = data;
    isiDropdown();
});

function isiDropdown(){
    const selects = document.querySelectorAll("select");
    selects.forEach(select => {
        daftarBarang.forEach(item=>{
            const option = document.createElement("option");
            option.value = item.harga;
            option.textContent = item.nama;
            select.appendChild(option);
        });
    });
}

function tambahBaris(){
    const table = document.getElementById("itemTable");
    const row = table.rows[0].cloneNode(true);
    row.querySelector(".harga").innerText = "0";
    row.querySelector(".total").innerText = "0";
    row.querySelector("input").value = 1;
    table.appendChild(row);
    isiDropdown();
}

function updateHarga(select){
    const harga = select.value;
    const row = select.closest("tr");
    row.querySelector(".harga").innerText = formatRupiah(harga);
    hitungTotal();
}

function hitungTotal(){
    let subtotal = 0;
    const rows = document.querySelectorAll("#itemTable tr");

    rows.forEach(row=>{
        const harga = parseInt(row.querySelector(".harga").innerText.replace(/\D/g,'')) || 0;
        const qty = row.querySelector("input").value;
        const total = harga * qty;
        row.querySelector(".total").innerText = formatRupiah(total);
        subtotal += total;
    });

    document.getElementById("subtotal").value = formatRupiah(subtotal);
    hitungStatus();
}

function hitungStatus(){
    const subtotal = parseInt(document.getElementById("subtotal").value.replace(/\D/g,'')) || 0;
    const dp = parseInt(document.getElementById("dp").value) || 0;
    const sisa = subtotal - dp;

    document.getElementById("sisa").value = formatRupiah(sisa);

    let status = "";
    if(dp === 0){
        status = "Belum Dibayar";
    } else if(dp < subtotal){
        status = "Belum Lunas (DP)";
    } else {
        status = "Lunas";
    }

    document.getElementById("statusPembayaran").innerText = status;
}

function formatRupiah(angka){
    return "Rp " + Number(angka).toLocaleString("id-ID");
}

function generateInvoice(){
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const dd = String(now.getDate()).padStart(2,'0');
    const HH = String(now.getHours()).padStart(2,'0');
    const MM = String(now.getMinutes()).padStart(2,'0');
    const SS = String(now.getSeconds()).padStart(2,'0');

    const kode = `SKA${yyyy}${mm}${dd}${HH}${MM}${SS}`;
    document.getElementById("invoiceNumber").value = kode;
}

window.onload = function(){
    generateInvoice();
}
</script>

</body>
</html>
