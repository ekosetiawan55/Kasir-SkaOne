<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Invoice SkaOne Photography</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
.card{
    background:white;
    padding:30px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo{
    height:80px;
}
h2{
    margin:0;
}
.form-group{
    margin-bottom:15px;
}
label{
    font-weight:bold;
    display:block;
    margin-bottom:5px;
}
input, select{
    width:100%;
    padding:8px;
    box-sizing:border-box;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th, td{
    border:1px solid #ddd;
    padding:8px;
}
th{
    background:#f0f0f0;
}
.text-right{
    text-align:right;
}
.total-section{
    margin-top:20px;
    width:300px;
    float:right;
}
.status{
    margin-top:10px;
    font-weight:bold;
    text-align:center;
}
.footer{
    text-align:center;
    margin-top:40px;
}
button{
    padding:8px 12px;
    cursor:pointer;
}
.action-buttons{
    margin-bottom:20px;
    display:flex;
    gap:10px;
}
</style>
</head>

<body>
<div class="container">

<div class="action-buttons">
    <button onclick="previewPDF()">Preview PDF</button>
    <button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="card" id="invoiceArea">

<div class="header">
    <img src="logo.png" class="logo">
    <div>
        <h2>INVOICE</h2>
        <div class="form-group">
            <label>Nomor Invoice</label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="invoiceNumber">
                <button type="button" onclick="generateInvoice()">Auto</button>
            </div>
        </div>
    </div>
</div>

<hr>

<div class="form-group">
    <label>Nama Pemesan</label>
    <input type="text" id="namaPemesan">
</div>

<div class="form-group">
    <label>Alamat</label>
    <input type="text" id="alamat">
</div>

<div class="form-group">
    <label>Job</label>
    <input type="text" id="job">
</div>

<div class="form-group">
    <label>Jatuh Tempo</label>
    <input type="date" id="jatuhTempo">
</div>

<table>
<thead>
<tr>
    <th>Nama Barang</th>
    <th>Harga</th>
    <th>Qty</th>
    <th>Total</th>
</tr>
</thead>
<tbody id="itemTable"></tbody>
</table>

<br>
<button onclick="tambahBaris()">Tambah Item</button>

<div class="total-section">
    <div class="form-group">
        <label>Subtotal</label>
        <input type="text" id="subtotal" class="text-right" readonly>
    </div>

    <div class="form-group">
        <label>Uang Muka (DP)</label>
        <input type="number" id="dp" class="text-right" value="0" onchange="hitungStatus()">
    </div>

    <div class="form-group">
        <label>Sisa</label>
        <input type="text" id="sisa" class="text-right" readonly>
    </div>

    <div class="status" id="statusPembayaran"></div>
</div>

<div style="clear:both;"></div>

<div class="footer">
    <hr>
    <p><strong>SkaOne Photography</strong></p>
    <p>Abadikan momentmu bersama SkaOne Photography</p>
    <p>Email: skaonephotography@email.com</p>
</div>

</div>
</div>

<script>
let daftarBarang = [];

fetch('barang.json')
.then(res => res.json())
.then(data => {
    daftarBarang = data;
    tambahBaris();
});

function tambahBaris(){
    const table = document.getElementById("itemTable");
    const row = document.createElement("tr");

    row.innerHTML = `
        <td>
            <select onchange="updateHarga(this)">
                <option value="">Pilih Barang</option>
                ${daftarBarang.map(item => 
                    `<option value="${item.harga}">${item.nama}</option>`
                ).join('')}
            </select>
        </td>
        <td class="text-right harga">Rp 0</td>
        <td><input type="number" value="1" min="1" onchange="hitungTotal()"></td>
        <td class="text-right total">Rp 0</td>
    `;

    table.appendChild(row);
}

function updateHarga(select){
    const harga = parseInt(select.value) || 0;
    const row = select.closest("tr");
    row.querySelector(".harga").innerText = formatRupiah(harga);
    hitungTotal();
}

function hitungTotal(){
    let subtotal = 0;
    const rows = document.querySelectorAll("#itemTable tr");

    rows.forEach(row=>{
        const harga = parseInt(row.querySelector(".harga").innerText.replace(/\D/g,'')) || 0;
        const qty = row.querySelector("input").value;
        const total = harga * qty;
        row.querySelector(".total").innerText = formatRupiah(total);
        subtotal += total;
    });

    document.getElementById("subtotal").value = formatRupiah(subtotal);
    hitungStatus();
}

function hitungStatus(){
    const subtotal = parseInt(document.getElementById("subtotal").value.replace(/\D/g,'')) || 0;
    const dp = parseInt(document.getElementById("dp").value) || 0;
    const sisa = subtotal - dp;

    document.getElementById("sisa").value = formatRupiah(sisa);

    let status = "";
    if(subtotal === 0){
        status = "";
    } else if(dp === 0){
        status = "Belum Dibayar";
    } else if(dp < subtotal){
        status = "Belum Lunas (DP)";
    } else {
        status = "Lunas";
    }

    document.getElementById("statusPembayaran").innerText = status;
}

function formatRupiah(angka){
    return "Rp " + Number(angka).toLocaleString("id-ID");
}

function generateInvoice(){
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const dd = String(now.getDate()).padStart(2,'0');
    const HH = String(now.getHours()).padStart(2,'0');
    const MM = String(now.getMinutes()).padStart(2,'0');
    const SS = String(now.getSeconds()).padStart(2,'0');
    const kode = `SKA${yyyy}${mm}${dd}${HH}${MM}${SS}`;
    document.getElementById("invoiceNumber").value = kode;
}

window.onload = function(){
    generateInvoice();
}

async function previewPDF(){
    const canvas = await html2canvas(document.getElementById("invoiceArea"));
    const imgData = canvas.toDataURL("image/png");
    const previewWindow = window.open("");
    previewWindow.document.write(`<img src="${imgData}" style="width:100%">`);
}

async function downloadPDF(){
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById("invoiceArea"));
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF('p','mm','a4');
    const width = 210;
    const height = canvas.height * width / canvas.width;

    pdf.addImage(imgData,'PNG',0,0,width,height);
    pdf.save("invoice.pdf");
}
</script>

</body>
</html>
